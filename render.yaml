# Конфигурация для Render.com
# Заходишь на https://render.com → New → Background Worker → подключаешь репозиторий
# Render сам прочитает этот файл и развернёт бота

services:
  - type: worker
    name: oge-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false   # токен задашь руками в админке Render
      - key: PYTHON_VERSION
        value: 3.11.9
